      // Decode the path redirect from 404.html back into a real URL.

          var decoded = l.search

            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')

            null,
            null,
            l.pathname.slice(0, -1) +
              decoded[0] +
              (decoded[1] ? '?' + decoded[1] : '') +
              l.hash,
